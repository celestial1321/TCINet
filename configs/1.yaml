logging:
  mode: "offline"
  project: "TCINet-PanNuke-Ablation"
  notes: "TCINet v2 stronger boundary supervision"
  log_comment: "TCINet_tacnet_v2_bw8_fold1"
  tags:
    - "TCINet"
    - "PanNuke"
    - "SAM-H"
    - "boundary_weight_8"
    - "fold1"
  wandb_dir: "./wandb"
  log_dir: "./logs"
  level: "info"
  log_images: false
  group: "tacnet_v2_bw8"

random_seed: 19

gpu: 0

data:
  dataset: "PanNuke"
  dataset_path: "/root/autodl-tmp/TCINet-main/cell_segmentation/datasets/PanNuke_pre"
  train_folds: [0, 2]
  val_folds: [1]
  test_folds: null
  num_nuclei_classes: 6
  num_tissue_classes: 19
  input_shape: 256

model:
  backbone: "SAM-H"
  pretrained_encoder: "/root/autodl-tmp/TCINet-main/models/pretrained/SAM/sam_vit_h.pth"
  pretrained: null
  embed_dim: 1280
  input_channels: 3
  depth: 32
  num_heads: 16
  extract_layers: [8, 16, 24, 32]
  shared_decoders: false
  regression_loss: false

loss:
  nuclei_binary_map:
    focaltverskyloss:
      loss_fn: FocalTverskyLoss
      weight: 1.2
    dice:
      loss_fn: dice_loss
      weight: 1.2
    boundary_bce:
      loss_fn: BoundaryWeightedBCELoss
      weight: 1.2
      args:
        boundary_weight: 8.0
        kernel_size: 3
  hv_map:
    mse:
      loss_fn: mse_loss_maps
      weight: 2.5
    msge:
      loss_fn: msge_loss_maps
      weight: 10.0
  nuclei_type_map:
    focaltverskyloss:
      loss_fn: MCFocalTverskyLoss
      weight: 0.5
      args:
        num_classes: 6
    dice:
      loss_fn: dice_loss
      weight: 0.2
    bce:
      loss_fn: xentropy_loss
      weight: 0.5
  tissue_types:
    ce:
      loss_fn: CrossEntropyLoss
      weight: 0.2

training:
  batch_size: 8
  accum_iter: 2
  epochs: 130
  unfreeze_epoch: 25
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.0
  optimizer: "AdamW"
  optimizer_hyperparameter:
    lr: 0.0003
    weight_decay: 0.0001
    betas: [0.85, 0.85]
  early_stopping_patience: 150
  scheduler:
    scheduler_type: "exponential"
    gamma: 0.9
  sampling_strategy: "cell+tissue"
  sampling_gamma: 0.85
  mixed_precision: true
  eval_every: 1

transformations:
  randomrotate90:
    p: 0.5
  horizontalflip:
    p: 0.5
  verticalflip:
    p: 0.5
  downscale:
    p: 0.15
    scale: 0.5
  blur:
    p: 0.2
    blur_limit: 10
  gaussnoise:
    p: 0.25
    var_limit: 50
  colorjitter:
    p: 0.2
    scale_setting: 0.25
    scale_color: 0.1
  superpixels:
    p: 0.1
  zoomblur:
    p: 0.1
  randomsizedcrop:
    p: 0.1
  elastictransform:
    p: 0.2
  normalize:
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]

eval_checkpoint: "model_best.pth"